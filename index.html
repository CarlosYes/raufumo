<!DOCTYPE html>
<html lang="pt-PT">
<head>
    <meta charset="UTF-8">
    <title>Radio Amigos Unidos - Rainbow Smoke Edition</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-select=none">
    <link rel="icon" type="image/png" href="https://i.imgur.com/nNh98kV.png" sizes="192x192" />
    <style>
        html, body { margin: 0; padding: 0; width: 100%; height: 100%; background: #000; overflow: hidden; -webkit-user-select: none; user-select: none; }
        canvas { position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; z-index: 1; pointer-events: none; }
        
        .logo-container { position: absolute; top: 35%; left: 50%; transform: translate(-50%, -50%); z-index: 5; pointer-events: none; }
        .radio-logo { width: 22vw; min-width: 200px; max-width: 350px; filter: drop-shadow(0 0 30px rgba(0,0,0,0.8)); animation: float 15s ease-in-out infinite; }

        @keyframes float { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-20px); } }

        .photobanner-container { 
            position: fixed; bottom: 0; left: 0; width: 100%; height: 380px; 
            overflow: hidden; z-index: 10; background: transparent !important;
            display: flex; align-items: flex-end; 
        }
        
        .photobanner { display: flex; width: max-content; animation: scroll 160s linear infinite; }
        
        .photo-card { 
            height: 240px; margin: 0 15px; padding: 5px; 
            background: linear-gradient(45deg, #ffff00, #00d9ff, #ff00ff, #00ff00); 
            background-size: 400%; border-radius: 12px; 
            animation: rainbow 30s linear infinite; flex-shrink: 0;
            position: relative; 
        }

        .bird-overlay {
            position: absolute; width: 38px; top: -12px; left: 50%;
            transform: translateX(-50%); z-index: 100;
            animation: bird-hover 2s ease-in-out infinite;
        }

        @keyframes bird-hover {
            0%, 100% { transform: translateX(-50%) translateY(0) rotate(-5deg); }
            50% { transform: translateX(-50%) translateY(-3px) rotate(5deg); }
        }

        .photo-card img:not(.bird-overlay) { height: 100%; width: auto; border-radius: 8px; display: block; }

        @keyframes rainbow { 0% { background-position: 0% 50%; } 50% { background-position: 100% 50%; } 100% { background-position: 0% 50%; } }
        @keyframes scroll { 0% { transform: translateX(100vw); } 100% { transform: translateX(-100%); } }
    </style>
</head>
<body>

    <canvas id="shaderCanvas"></canvas>

    <div class="logo-container">
        <img src="https://i.imgur.com/R3zxEUk.png" alt="Logo" class="radio-logo">
    </div>

    <div class="photobanner-container">
        <div class="photobanner">
            <script>
                // Lista recuperada com links e identificação interna (alt)
                const images = [
                    { src: "https://xatimg.com/image/G9aZLhJTghaK.png", alt: "" },
                    { src: "https://xatimg.com/image/NVlH1z0f4nKF.jpg", alt: "nanito" },

                    { src: "https://xatimg.com/image/iGyY0rOtGkKN.jpg", alt: "filó" },
                    { src: "https://xatimg.com/image/DqIJkxRepz8m.jpg", alt: "santos" },
                    { src: "https://xatimg.com/image/qktmURudMDfz.jpg", alt: "marga" },
                    { src: "https://xatimg.com/image/F0kPR63gfr4i.jpg", alt: "dja" },

                    { src: "https://xatimg.com/image/CNK9BHZD4JiB.jpg", alt: "adelaide" },
                    { src: "https://xatimg.com/image/wBEFTfX7wrKm.jpg", alt: "maroto" },
                    { src: "https://xatimg.com/image/4mKNXANhhfc5.jpg", alt: "ana" },
                    { src: "https://xatimg.com/image/L79hOX8jXqYV.jpg", alt: "roger" },
                    { src: "https://xatimg.com/image/F6n4HrsqHKud.jpg", alt: "sagitaria" },
                    { src: "https://xatimg.com/image/16w2ge7ybIV5.jpg", alt: "jow" },
                    { src: "https://xatimg.com/image/BHXrfcoYoyKC.jpg", alt: "lina" },
                    { src: "https://xatimg.com/image/V0kyQhtqKG1p.jpg", alt: "josé rodrigues" },
                    { src: "https://xatimg.com/image/5FI24YJqIDNM.jpg", alt: "gi" },

                    { src: "https://xatimg.com/image/5oD6mKpJ191f.gif", alt: "gif" }
                ];
                
                const birdGif = "https://i.imgur.com/HPIUvNC.gif";
                const banner = document.querySelector('.photobanner');
                
                images.forEach(imgData => {
                    const card = document.createElement('div');
                    card.className = 'photo-card';
                    card.innerHTML = `<img src="${birdGif}" class="bird-overlay"><img src="${imgData.src}" alt="${imgData.alt}" />`;
                    banner.appendChild(card);
                });
            </script>
        </div>
    </div>

    <script type="x-shader/x-fragment">#version 300 es
    precision highp float;
    out vec4 O;
    uniform float time;
    uniform vec2 resolution;

    float hash(vec2 p) {
        return fract(sin(dot(p, vec2(127.1, 311.7))) * 43758.5453123);
    }

    float noise(vec2 p) {
        vec2 i = floor(p); vec2 f = fract(p);
        vec2 u = f*f*(3.0-2.0*f);
        return mix(mix(hash(i + vec2(0,0)), hash(i + vec2(1,0)), u.x),
                   mix(hash(i + vec2(0,1)), hash(i + vec2(1,1)), u.x), u.y);
    }

    float fbm(vec2 p) {
        float v = 0.0; float a = 0.5;
        for (int i = 0; i < 6; i++) {
            v += a * noise(p);
            p *= 2.0; a *= 0.5;
        }
        return v;
    }

    vec3 rainbow(float t) {
        return 0.5 + 0.5 * cos(6.28318 * (vec3(1,1,1) * t + vec3(0.0, 0.33, 0.67)));
    }

    void main() {
        vec2 uv = (gl_FragCoord.xy * 2.0 - resolution.xy) / min(resolution.x, resolution.y);
        float t = time * 0.4;
        vec2 q = vec2(fbm(uv + vec2(0.0, -t * 0.2)), fbm(uv + vec2(1.0)));
        vec2 r = vec2(fbm(uv + q + vec2(1.7, 9.2) + 0.15 * t), fbm(uv + q + vec2(8.3, 2.8) + 0.126 * t));
        float f = fbm(uv + r);
        vec3 col = rainbow(t * 0.1 + f * 0.2);
        vec3 finalCol = mix(vec3(0.0), col, f * 1.5) + f * f * col * 0.5;
        O = vec4(finalCol * 1.4, 1.0);
    }
    </script>

    <script>
    window.onload = () => {
        const canvas = document.getElementById("shaderCanvas");
        const gl = canvas.getContext("webgl2");
        if (!gl) return;
        const vs = gl.createShader(gl.VERTEX_SHADER);
        gl.shaderSource(vs, "#version 300 es\nin vec4 position; void main(){gl_Position=position;}");
        gl.compileShader(vs);
        const fs = gl.createShader(gl.FRAGMENT_SHADER);
        gl.shaderSource(fs, document.querySelector("script[type='x-shader/x-fragment']").textContent);
        gl.compileShader(fs);
        const program = gl.createProgram();
        gl.attachShader(program, vs); gl.attachShader(program, fs);
        gl.linkProgram(program);
        gl.bindBuffer(gl.ARRAY_BUFFER, gl.createBuffer());
        gl.bufferData(gl.ARRAY_BUFFER, new Float32Array([-1,1,-1,-1,1,1,1,-1]), gl.STATIC_DRAW);
        const resize = () => {
            canvas.width = window.innerWidth; canvas.height = window.innerHeight;
            gl.viewport(0, 0, canvas.width, canvas.height);
        };
        window.onresize = resize; resize();
        const render = (now) => {
            gl.useProgram(program);
            const pos = gl.getAttribLocation(program, "position");
            gl.enableVertexAttribArray(pos);
            gl.vertexAttribPointer(pos, 2, gl.FLOAT, false, 0, 0);
            gl.uniform2f(gl.getUniformLocation(program, "resolution"), canvas.width, canvas.height);
            gl.uniform1f(gl.getUniformLocation(program, "time"), now * 0.001);
            gl.drawArrays(gl.TRIANGLE_STRIP, 0, 4);
            requestAnimationFrame(render);
        };
        requestAnimationFrame(render);
    };
    </script>

    <script>
        var message = "©arlos Copyright - Proteção RAU";
        document.oncontextmenu = function(){ alert(message); return false; };
        document.onselectstart = function(){ return false; };
        window.addEventListener('keydown', function(e) {
            if (e.keyCode == 123 || (e.ctrlKey && e.shiftKey && e.keyCode == 73)) {
                e.preventDefault();
                return false;
            }
        });
    </script>
</body>
</html>
